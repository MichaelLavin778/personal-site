name: Promote main -> production

on:
  schedule:
    - cron: "17 16 * * 5"
      timezone: "America/Denver"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  gate:
    name: Verify CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: E2E (Playwright)
        env:
          VITE_APP_ENV: main
        run: npx playwright test

  promote:
    name: Push main to production
    needs: gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Push main -> production
        run: git push origin HEAD:production
