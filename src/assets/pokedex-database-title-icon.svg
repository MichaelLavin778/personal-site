<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Pokédex Database Title Icon</title>
  <desc id="desc">A compact Pokéball-inspired database icon for a Pokémon-style personal website.</desc>
  <defs>
    <linearGradient id="red" x1="0" y1="48" x2="0" y2="268" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="0.55" stop-color="#ef233c"/>
      <stop offset="1" stop-color="#c1121f"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="258" x2="0" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9eef5"/>
    </linearGradient>
    <linearGradient id="steel" x1="122" y1="120" x2="390" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a4454"/>
      <stop offset="1" stop-color="#171b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".24"/>
    </filter>
  </defs>

  <!-- outer badge -->
  <circle cx="256" cy="256" r="224" fill="url(#steel)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="198" fill="#0f1218"/>

  <!-- pokeball / database hybrid body -->
  <path d="M83 244C89 148 165 72 256 72s167 76 173 172H83Z" fill="url(#red)"/>
  <path d="M83 268c6 96 82 172 173 172s167-76 173-172H83Z" fill="url(#white)"/>

  <!-- database stack lines -->
  <path d="M111 172c34 28 85 44 145 44s111-16 145-44" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity=".34"/>
  <path d="M111 340c34 28 85 44 145 44s111-16 145-44" fill="none" stroke="#b7c2d0" stroke-width="18" stroke-linecap="round" opacity=".42"/>

  <!-- center band -->
  <rect x="70" y="224" width="372" height="64" rx="32" fill="#11151c"/>
  <rect x="92" y="240" width="328" height="32" rx="16" fill="#262c38"/>

  <!-- center button -->
  <circle cx="256" cy="256" r="70" fill="#11151c"/>
  <circle cx="256" cy="256" r="48" fill="#f8fafc"/>
  <circle cx="256" cy="256" r="25" fill="#dce4ef"/>
  <circle cx="256" cy="256" r="12" fill="#ef233c"/>

  <!-- subtle sparkle/search marker -->
  <path d="M350 111l11 25 25 11-25 11-11 25-11-25-25-11 25-11 11-25Z" fill="#ffd166"/>
</svg>
